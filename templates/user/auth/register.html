<!DOCTYPE html>
<html lang="en" class="js">
<head>
    <meta charset="utf-8">
    <title>User Register | Fraud Detection System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- DashLite CSS -->
      <link rel="shortcut icon" href="{{ url_for('static', filename='admin/images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/dashlite9b70.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/theme9b70.css') }}">
</head>

<body class="nk-body bg-white npc-general pg-auth">

<div class="nk-app-root">
    <div class="nk-main">
        <div class="nk-wrap nk-wrap-nosidebar">
            <div class="nk-content">
                <div class="nk-block nk-block-middle nk-auth-body wide-xs">

                    <!-- LOGO -->
                    <div class="brand-logo pb-4 text-center">
                        <a href="#" class="logo-link">
                            <img class="logo-img logo-img-lg"
                                 src="{{ url_for('static', filename='admin/images/loginlogo.png') }}"
                                 alt="logo">
                        </a>
                    </div>

                    <div class="card card-bordered">
                        <div class="card-inner card-inner-lg">

                            <div class="nk-block-head">
                                <div class="nk-block-head-content">
                                    <h4 class="nk-block-title">Create User Account</h4>
                                    <div class="nk-block-des">
                                        <p>Register to submit reviews.</p>
                                    </div>
                                </div>
                            </div>

                            {% if error %}
                                <div class="alert alert-danger">{{ error }}</div>
                            {% endif %}

                            <form method="POST">
                                <div class="form-group">
                                    <label class="form-label">Name</label>
                                    <div class="form-control-wrap">
                                        <input type="text"
                                               name="name"
                                               class="form-control form-control-lg"
                                               placeholder="Enter your name"
                                               required>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <div class="form-control-wrap">
                                        <input type="email"
                                               name="email"
                                               class="form-control form-control-lg"
                                               placeholder="Enter your email"
                                               required>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Password</label>
                                    <div class="form-control-wrap">
                                        <input type="password"
                                               name="password"
                                               class="form-control form-control-lg"
                                               placeholder="Create a password"
                                               required>
                                    </div>
                                </div>

                                <div class="form-group mt-4">
                                    <button class="btn btn-lg btn-primary btn-block">
                                        Register
                                    </button>
                                </div>
                            </form>

                            <div class="text-center mt-4">
                                <a href="{{ url_for('user_auth.login') }}">Already have an account? Sign in</a>
                            </div>

                        </div>
                    </div>

                    <div class="text-center pt-4">
                        <p class="text-soft">&copy; 2026 Fraud Detection System</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='admin/js/bundle9b70.js') }}"></script>
<script src="{{ url_for('static', filename='admin/js/scripts9b70.js') }}"></script>

</body>
</html>
